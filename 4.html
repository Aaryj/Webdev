<!DOCTYPE html>
<html>
<head>
    <title>CSS Example</title>

    <!-- Internal CSS -->
    <style>

        h2{
            color: blue;
            text-align: center;
        }

        p{
            font-size: 18px;
            color: green;
        }

        table{
            border-collapse: collapse;
            width: 50%;
        }

        th, td{
            border: 1px solid black;
            padding: 10px;
        }

    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <!-- Inline CSS -->
    <h1 style="color:red;">Inline CSS Example</h1>

    <h2>Internal CSS Example</h2>

    <p>This paragraph is styled using internal CSS.</p>

    <table>
        <tr>
            <th>Name</th>
            <th>Course</th>
        </tr>

        <tr>
            <td>Aary</td>
            <td>BE</td>
        </tr>
    </table>

</body>
</html>
