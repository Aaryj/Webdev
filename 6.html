<!DOCTYPE html>
<html>
<head>
    <title>DOM Manipulation Example</title>

    <style>
        body{
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }

        #message{
            color: blue;
            font-size: 24px;
        }

        button{
            padding: 10px 20px;
            font-size: 16px;
        }
    </style>

    <script>

        function changeContent() {

            // Access element using DOM
            let msg = document.getElementById("message");

            // Change content dynamically
            msg.innerHTML = "Welcome to JavaScript DOM Manipulation!";

            // Change style dynamically
            msg.style.color = "red";
            msg.style.fontWeight = "bold";
        }

    </script>

</head>
<body>

    <h1 id="message">Click the Button to Change Content</h1>

    <button onclick="changeContent()">
        Click Here
    </button>

</body>
</html>
